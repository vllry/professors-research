networks:
  test-network:
    driver: bridge

services:
  api:
    image: professors-research-api-test-image
    build:
      context: .
      dockerfile: Dockerfile
    container_name: professors-research-api-test
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - PORT=8080
    healthcheck:
      # Use GET (not HEAD). `wget --spider` uses HEAD and our handler returns 405.
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s
    networks:
      - test-network

  web:
    image: professors-research-web-test-image
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: professors-research-web-test
    ports:
      - "5173:5173"
    environment:
      - PORT=8080
      - API_HOST=api
      - VITE_API_URL=http://api:8080
    volumes:
      - ./web:/app
      - /app/node_modules
      - /app/dist
    working_dir: /app
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:5173"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    networks:
      - test-network

  test:
    image: professors-research-test-runner-image
    build:
      context: ./web
      dockerfile: Dockerfile.test
    container_name: professors-research-test-runner
    environment:
      - PLAYWRIGHT_BASE_URL=http://web:5173
      - CI=true
    volumes:
      - ./web:/app
      - ./testdata:/testdata
      - /app/node_modules
      - /app/dist
      - playwright-report:/app/playwright-report
    working_dir: /app
    depends_on:
      web:
        condition: service_healthy
    command: npm test
    profiles:
      - test
    networks:
      - test-network

volumes:
  playwright-report:

