apiVersion: apps/v1
kind: Deployment
metadata:
  name: professors-research-api
  namespace: professors-research
  labels:
    app: professors-research-api
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: professors-research-api
  template:
    metadata:
      labels:
        app: professors-research-api
    spec:
      containers:
        - name: api-server
          image: us-central1-docker.pkg.dev/zeitgeistlabs/us-central1-docker/professors-research-api:21e62fe-dirty
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "20m"
            limits:
              memory: "256Mi"
              cpu: "1"

