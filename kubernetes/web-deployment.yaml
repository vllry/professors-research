apiVersion: apps/v1
kind: Deployment
metadata:
  name: professors-research-web
  namespace: professors-research
  labels:
    app: professors-research-web
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: professors-research-web
  template:
    metadata:
      labels:
        app: professors-research-web
    spec:
      containers:
        - name: nginx
          image: us-central1-docker.pkg.dev/zeitgeistlabs/us-central1-docker/professors-research-web:87674dc
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "10m"
            limits:
              memory: "256Mi"
              cpu: "1"

