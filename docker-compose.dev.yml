services:
  api:
    image: professors-research-api-dev-image
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: professors-research-api-dev
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - PORT=8080
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Exclude node_modules and other build artifacts
      - /app/tmp
      - /app/bin
      - /app/web/node_modules
      - /app/web/dist
    working_dir: /app
    command: air -c .air.toml
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  web:
    image: professors-research-web-dev-image
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: professors-research-web-dev
    ports:
      - "5173:5173"
    environment:
      - PORT=${PORT:-8080}
      - VITE_API_URL=http://api:8080
    volumes:
      # Mount source code for hot reload
      - ./web:/app
      # Exclude node_modules to use container's installed version
      - /app/node_modules
      - /app/dist
    working_dir: /app
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "-O", "/dev/null", "http://localhost:5173"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

